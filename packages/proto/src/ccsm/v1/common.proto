// Forever-stable wire schema. See specs/2026-05-03-v03-daemon-split-design.md
// chapter 04 §2 for the contract. Field numbers MUST NOT be reused or
// renumbered. Additions are always new field numbers with new names.
syntax = "proto3";

package ccsm.v1;

// Forever-stable. New principal kinds added as new oneof variants in v0.4.
message Principal {
  // F3: closes R0 03-P0.2 / R0 04-P0.1 — slot 2 reserved via the protobuf
  // `reserved` keyword (NOT a `// comment`) so any v0.3.x patch that tries
  // to bind a different message to field number 2 is rejected by `protoc`
  // before `buf breaking` even runs. v0.4 lifts the reservation by deleting
  // the `reserved 2;` line and adding `CfAccess cf_access = 2;` in the same
  // patch — the deletion-plus-add is a single atomic schema move and is
  // additive at the wire level (no v0.3 producer ever emitted field 2).
  oneof kind {
    LocalUser local_user = 1;
  }
  reserved 2;                  // v0.4: CfAccess cf_access = 2;
}

message LocalUser {
  string uid = 1;          // numeric uid (unix) or SID (windows), as string
  string display_name = 2; // OS-reported display name; advisory only
}

// Forever-stable. Surfaced to UI; ordering MUST match enum int values forever.
//
// F8: closes R0 06-P0.4 / spec ch06 §4 — the additive `SESSION_STATE_DEGRADED`
// variant is wired through `PtyFrame.session_state_changed` (pty.proto) so
// subscribers learn the daemon has stopped attempting snapshot writes for the
// session for the next 60 s after the 3-strike disk-class failure threshold.
// The session continues to stream live deltas from the in-memory ring during
// the cooldown; DEGRADED is purely an out-of-band signal, NOT a separate
// process-lifecycle state. After the cooldown elapses and a probe write
// succeeds the session transitions back to `SESSION_STATE_RUNNING` (also
// signalled via `session_state_changed`).
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_STARTING = 1;
  SESSION_STATE_RUNNING = 2;
  SESSION_STATE_EXITED = 3;
  SESSION_STATE_CRASHED = 4;
  SESSION_STATE_DEGRADED = 5;
}

// Forever-stable. Per-session SDK-turn axis — ORTHOGONAL to `SessionState`
// (which is process lifecycle: STARTING/RUNNING/EXITED/CRASHED). A session
// in `SESSION_STATE_RUNNING` (the OS subprocess is alive) can be in any of
// the three turn states below depending on what claude is doing inside that
// subprocess. UI uses the turn axis to drive the AgentIcon attention halo
// (idle / requires_action → halo on, running → halo off); process axis
// drives the row presence + crash/exit affordances. Don't conflate.
//
// Mirrors the SDK's authoritative `SDKSessionStateChangedMessage.state`
// enum (see `node_modules/@anthropic-ai/claude-agent-sdk/sdk.d.ts`) so the
// daemon does not invent a parallel vocabulary the UI then has to translate
// twice. ccsm spawns the CLI as a subprocess and tails the on-disk JSONL
// transcript to infer this axis (see
// `packages/daemon/src/sessionWatcher/inference.ts`).
//
// Wire encoding: the proto3 enum names below intentionally collide with no
// existing identifier. The `*_UNSPECIFIED = 0` slot is the proto3 default
// and means "daemon has not yet inferred a turn state for this session"
// (e.g. JSONL file not yet appeared). Clients MUST treat UNSPECIFIED as
// "no halo signal" — NOT as a synonym for IDLE — to avoid spurious
// attention flashes during session start-up before the first JSONL frame
// lands.
enum SessionTurnState {
  SESSION_TURN_STATE_UNSPECIFIED = 0;
  // Claude finished its turn; the user owes the next move. Drive halo on.
  SESSION_TURN_STATE_IDLE = 1;
  // Claude is mid-turn (tool call in flight, or user just typed and the
  // assistant frame hasn't landed yet). Halo off.
  SESSION_TURN_STATE_RUNNING = 2;
  // Claude paused on a permission prompt. Drive halo on (same UX as IDLE
  // for v0.3; v0.4 may differentiate with a distinct affordance).
  SESSION_TURN_STATE_REQUIRES_ACTION = 3;
}

// Forever-stable. Used by every RPC for traceability.
//
// F7: closes R4 P1 — daemon MUST validate `request_id` is non-empty on every
// RPC. Empty `request_id` -> ConnectError `INVALID_ARGUMENT` with
// `ErrorDetail.code = "request.missing_id"`. Daemon MUST NOT silently
// synthesize a substitute (would break client-side correlation logs and
// hide a misbehaving client). Test: `proto/request-meta-validation.spec.ts`
// covers the rejection path for every Connect RPC.
message RequestMeta {
  string request_id = 1;       // client-generated UUIDv4; daemon rejects empty with INVALID_ARGUMENT
  string client_version = 2;   // semver of caller (electron / web / ios)
  int64 client_send_unix_ms = 3;
}

// Forever-stable error detail attached to ConnectError.details.
message ErrorDetail {
  string code = 1;             // stable string, e.g. "session.not_found"
  string message = 2;          // human-readable; UI may show
  map<string, string> extra = 3;
}
