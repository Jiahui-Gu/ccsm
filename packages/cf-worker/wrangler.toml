name = "ccsm-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# R-53 (Task #175): expose this Worker on the account's workers.dev subdomain
# so the SPA + tunnel + OAuth all live under
# `https://ccsm-worker.<account-subdomain>.workers.dev`. This replaces the
# `cc-sm.pages.dev` Pages project (deleted as part of R-53). The account's
# `workers.dev` subdomain prefix is set per-account in the Cloudflare dashboard
# (Workers & Pages → Workers Subdomain); for jiahuigu@sjtu.edu.cn it is
# `jiahuigu`, so the production hostname is
# `ccsm-worker.jiahuigu.workers.dev`.
#
# Refs (verified via Cloudflare docs 2026-05-10):
#   - https://developers.cloudflare.com/workers/configuration/routing/workers-dev/
workers_dev = true

# Task #154 (R-49 audit P1, F-A-2): Cloudflare Workers Static Assets binding
# folds the cc-sm Pages site into this Worker, eliminating the prior
# Pages-Function reproxy hop (`packages/frontend-web/functions/[[path]].ts`)
# and the `cc-sm` Pages project. The browser now talks directly to the same
# Worker that owns TunnelDO, so /ws/default, /tunnel/default, /api/*, /token,
# /health are served by the Worker script and every other path is served as
# a static asset out of `packages/frontend-web/dist`.
#
# `directory` is resolved relative to this wrangler.toml (i.e. cf-worker/),
# so `../frontend-web/dist` points at the SPA build output. The deploy-worker
# workflow now builds frontend-web before invoking `wrangler deploy`.
#
# `not_found_handling = "single-page-application"` replaces the manual
# history-mode rewrite that lived in `functions/[[path]].ts`: any request
# that does not match a static asset and does not match a `run_worker_first`
# pattern returns 200 + index.html so client-side routes (`/sessions/123`)
# resolve to the SPA shell.
#
# `run_worker_first` lists every dynamic path the Worker owns. Listing them
# explicitly (as opposed to `run_worker_first = true` for everything) keeps
# static-asset serving on the asset-first fast path: `/index.html`,
# `/assets/*`, `/favicon.ico`, etc. never invoke the Worker script.
#
# Refs (verified via Cloudflare docs 2026-05-10):
#   - https://developers.cloudflare.com/workers/static-assets/
#   - https://developers.cloudflare.com/workers/static-assets/binding/
#   - https://developers.cloudflare.com/workers/static-assets/routing/
#   - https://developers.cloudflare.com/workers/static-assets/headers/
[assets]
directory = "../frontend-web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/health",
  "/ws/default",
  "/tunnel/default",
  "/token",
  "/api/*",
  # R-53 (Task #175): `/oauth/desktop/cb` is intentionally NOT listed here.
  # It is a static HTML page (`frontend-web/public/oauth/desktop/cb/index.html`
  # → `frontend-web/dist/oauth/desktop/cb/index.html`) and must be served on
  # the Workers Static Assets fast path so it bypasses any Pages-side legacy
  # routing (which previously returned 308 and broke the desktop OAuth flow).
  # The browser-side script then POSTs to `/api/auth/desktop/exchange` (in
  # the `/api/*` glob above) which the Worker handles.
]

# S4-T5 (Task #136): auth mode toggle. `legacy` keeps the S3-era
# token-based flow with a single shared TunnelDO keyed by `'default'` —
# what production runs today and what `npm run smoke` exercises. `jwt`
# enforces JWT verification on /ws/*, /tunnel/*, /api/* and /token, and
# routes each user into a per-user TunnelDO id (`user:<github_id>`).
#
# Production rollout: deploy with `legacy`, then flip to `jwt` (via
# `wrangler deploy --var CCSM_AUTH_MODE:jwt` or by editing this file) once
# the SPA sign-in UI (T7/T8) is shipped and propagating JWTs on the
# WebSocket subprotocol / Authorization header.
[vars]
CCSM_AUTH_MODE = "legacy"

# S4 (Task #113): GitHub OAuth App credentials + JWT signing keys.
# Set in production via:
#   wrangler secret put GITHUB_OAUTH_CLIENT_ID
#   wrangler secret put GITHUB_OAUTH_CLIENT_SECRET
#   wrangler secret put JWT_SIGNING_KEY
#   wrangler secret put JWT_REFRESH_SIGNING_KEY
# Local dev: copy `.dev.vars.example` → `.dev.vars` (gitignored) and fill in.
# Full setup steps: docs/S4-SETUP.md.

# Durable Object binding for the tunnel pairing logic. The class itself is
# implemented as a stub in T1 so wrangler can resolve the binding; T2 (#774)
# replaces the stub with the real TunnelDO that pairs browser ws ↔ daemon ws.
[[durable_objects.bindings]]
name = "TUNNEL"
class_name = "TunnelDO"

# S4-T2 (Task #121): per-user auth Durable Object. T2 only adds the binding +
# class skeleton; routes that dispatch into UserDO arrive in T5.
[[durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TunnelDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserDO"]
