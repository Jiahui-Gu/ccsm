name: deploy-worker

# Task #776 [S3-T7] (initial) + Task #154 [R-49 audit P1, F-A-2] (this rev):
# Cloudflare Worker deploy pipeline for cf-worker (TunnelDO browser <->
# daemon pairing + frame forward + folded SPA assets).
#
# Background — Task #154: the standalone `cc-sm` Cloudflare Pages project,
# its Pages Function (`packages/frontend-web/functions/[[path]].ts`), and
# the deploy-pages.yml workflow have been removed. The `cc-sm` SPA is now
# served as Workers Static Assets directly from the same Worker that owns
# TunnelDO (see `packages/cf-worker/wrangler.toml` `[assets]` block).
# This workflow therefore builds frontend-web (so `packages/frontend-web/dist`
# exists) before invoking `wrangler deploy`, which uploads both the Worker
# script and the static-asset bundle in a single atomic deploy.
#
# Triggers:
#   - push to main or working: ship cf-worker on every merge that touches
#     the Worker, the SPA, or any workspace dep that feeds the SPA build
#     (mirrors the previous deploy-pages.yml `paths` so SPA-only changes
#     still ship). Branch policy is unchanged: `working` is the post-v0.1.0
#     release main-line, `main` is the periodic roll-up.
#   - workflow_dispatch: manual redeploy from the Actions tab (e.g. after
#     rotating wrangler secrets or rolling back).
#
# NOTE: this workflow file itself is intentionally NOT in `paths` — editing
# the yml should not retrigger a deploy.
#
# Secrets (no new secrets required vs. the previous two-pipeline split):
#   - CLOUDFLARE_API_TOKEN: scoped token with Workers:Edit on account.
#     (The prior token was scoped Pages:Edit + Workers:Edit; reuse it or
#     re-scope to Workers:Edit only — Pages scope is no longer needed.)
#   - CLOUDFLARE_ACCOUNT_ID: account containing the cf-worker.

on:
  push:
    branches: [main, working]
    paths:
      - 'packages/cf-worker/**'
      - 'packages/frontend-web/**'
      - 'packages/ui/**'
      - 'packages/core/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

# Concurrency: only one Worker deploy at a time per ref; cancel stale runs.
concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # Task #172 [R-52 bug-infra]: build workspace deps BEFORE typecheck.
      # cf-worker imports @ccsm/shared (since R-48 sid envelope SoT moved to
      # shared), and frontend-web depends on shared/core/ui. Without dist
      # artifacts on disk, `tsc` resolving `@ccsm/shared` falls through to
      # the source pnpm symlink whose `package.json#types` points at the
      # *built* `.d.ts`, yielding `TS2307: Cannot find module '@ccsm/shared'`.
      # ci.yml already builds these before its `pnpm -r typecheck`; this
      # workflow had the build step AFTER typecheck — fixed below.
      # See gh run 25610689776..25619387306 (5 consecutive failures from R-48).
      - name: Build workspace deps (shared + core + ui — required by cf-worker typecheck and frontend-web build)
        run: pnpm -F @ccsm/shared build && pnpm -F @ccsm/core build && pnpm -F @ccsm/ui build

      - name: Typecheck cf-worker
        run: pnpm -F @ccsm/cf-worker typecheck

      - name: Build frontend-web (SPA assets bundled into the Worker deploy)
        run: pnpm -F @ccsm/frontend-web build

      - name: Deploy to Cloudflare Workers (script + static assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/cf-worker
          command: deploy
