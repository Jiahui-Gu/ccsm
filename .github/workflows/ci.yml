name: CI

on:
  pull_request:
    branches: [main, working]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**.md'
              - '!LICENSE'
              - '!.gitignore'

  lint-typecheck-test:
    name: lint + typecheck + test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Task #322 — windows-only matrix. Round 1-7 of the v0.3 ship-gate
        # PRs failed because the matrix ran ubuntu+macos+windows but none
        # were `required` in branch protection, letting devs alibi as
        # "Linux only / mac only / can't repro locally" through 6 rounds
        # of speculative fixes (history: PR #986). All current devs work
        # on Windows hosts; demoting to windows-only means local green ==
        # CI green with no platform escape hatch. Linux-conditional
        # guard steps below are migrated to windows-latest because their
        # tooling (bash, sha256sum, node, npx vitest) is available via
        # Git-for-Windows on the windows runner.
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    # Task #364 — bumped 10 → 15. CI eval showed avg 527s / p95 590s wall-clock,
    # leaving only ~10s under the 10-min cap; flaky timeout-cancellations were
    # masking real failures. Round-1 perf changes (cache restore-keys + coverage
    # merge) target ≤350s but the cap is widened first so a single cold-cache
    # PR doesn't redline.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required for tools/check-v02-shrinking.sh —
          # it needs `git merge-base HEAD origin/<base>` (or merge-base with
          # GITHUB_BASE_REF) AND a full first-parent walk of base..HEAD to
          # enforce step-wise monotonic shrinking (Task #279). A shallow
          # checkout would leave merge-base unresolvable AND truncate the
          # commit chain, silently weakening the guard.
          fetch-depth: 0

      # Wave 2 §5.6 (Task #222) + step-wise FOLLOWUP (Task #279) —
      # mechanical guard: files listed in .v0.2-only-files are slated for
      # deletion/shrinkage during the v0.3 cutover. CI enforces line counts
      # may shrink but never grow vs the merge-base AND must be step-wise
      # monotonic across every first-parent commit in this branch series
      # (so a file can't shrink in commit N then re-grow in commit N+1).
      # Was Linux-only pre-#322; runs on windows via Git-for-Windows bash
      # since this is the only matrix entry now.
      - name: Check v0.2-only files don't grow (incl. step-wise)
        run: bash tools/check-v02-shrinking.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          # Task #364 — removed `cache: 'npm'`. Conflicted with the explicit
          # `actions/cache` step below that keys node_modules directly: the
          # setup-node cache restores ~/.npm (which `npm ci` ignores when
          # node_modules already exists from the explicit cache restore) and
          # adds setup overhead with zero install-time benefit.

      # Wave 2 §5.5 (Task #220) — mechanical guard: the 4 ship-gate files
      # named in the v0.3 daemon-split spec must not be silently renamed
      # or deleted. tools/check-spec-code-lock.sh reads
      # docs/superpowers/specs/2026-05-03-v03-daemon-split.lock.json and
      # verifies every locked path exists with the recorded SHA256
      # (LF-normalized, so platform-stable). Was Linux-only pre-#322;
      # runs on windows now via Git-for-Windows bash + node. Placed after
      # Setup Node because the script uses `node -e` to parse the lock
      # JSON (no jq dependency).
      - name: Check spec-code lock (ship-gate paths)
        run: bash tools/check-spec-code-lock.sh

      # Linux native builds for better-sqlite3 need python + build tools; the
      # GitHub-hosted ubuntu image already has them, but setup-python makes
      # it explicit and pins the version so upstream image changes don't
      # surprise us.
      # Pinned to 3.11 because 3.12+ removed the distutils stdlib (PEP 632)
      # which the older node-gyp invoked by better-sqlite3's postinstall
      # still imports. Bump back when better-sqlite3 ships node-gyp >= 10.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache node_modules directly (not ~/.npm) — `npm ci --legacy-peer-deps`
      # on Windows is the dominant CI cost (~178s = 49% of total wall-clock,
      # eval #877). Restoring node_modules verbatim skips install + native
      # rebuilds (better-sqlite3, node-pty) baked into the cached tree.
      # Key includes os/arch/node major + lockfile hash so any dep change
      # busts the cache. Native ABI for Node-side tests is re-aligned by the
      # `npm rebuild better-sqlite3` step below, which always runs.
      - name: Cache node_modules
        id: nm_cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ runner.arch }}-node22-${{ hashFiles('package-lock.json') }}
          # Task #364 — fallback to any prior node22 cache when lockfile hash
          # changes. Cache hit rate was 1/8 over the last week because every
          # dep bump invalidates the primary key. With restore-keys, a stale
          # cache is restored and `npm ci` reconciles only the diff (much
          # faster than cold install). Native bindings (better-sqlite3,
          # node-pty) may carry old ABI from the stale cache; the
          # `npm rebuild better-sqlite3` step below always runs to realign.
          restore-keys: |
            nm-${{ runner.os }}-${{ runner.arch }}-node22-

      - name: Install deps
        if: steps.nm_cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps
        env:
          # electron-builder's postinstall needs this env to not fail on
          # first install when the Electron binary cache is cold.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # Rebuild better-sqlite3 against the current Node ABI (tests run under
      # node, not electron). The electron-builder `postinstall` above builds
      # for the electron ABI; we overwrite with the node ABI for CI tests
      # here. better-sqlite3 is hoisted to the root node_modules under npm
      # workspaces, so `npm rebuild` runs from the root (a `--prefix
      # packages/daemon` invocation no-ops because the daemon workspace has
      # no local copy). After the rebuild we verify by loading the native
      # module through packages/daemon's resolution path — fail fast on ABI
      # mismatch instead of waiting for the test step to dlopen-fail.
      - name: Rebuild native modules for current Node ABI
        run: npm rebuild better-sqlite3
      - name: Verify native ABI
        run: npm run check:native

      - name: Lint
        run: npm run lint:app

      # Wave 0f (#214) — ship-gate (a): zero IPC residue under electron/ + src/.
      # Forbidden symbols: ipcMain, ipcRenderer, contextBridge,
      # additionalArguments, webContents.send. Allowlist at
      # tools/.no-ipc-allowlist is forever-stable per chapter 15 §3 #29.
      - name: Lint (no IPC residue)
        run: npm run lint:no-ipc

      - name: Typecheck
        run: npm run typecheck

      # Task #128 / T10.12 — buf breaking against the merge-base SHA
      # pre-tag, or against the v0.3 release tag post-tag (auto-detected
      # by packages/proto/scripts/breaking-check.mjs). Spec ch11 §4 +
      # ch15 §3 #1, #2, #19, #20 — rejects field renumber, removal,
      # comment-only "reserved" bypass, and out-of-slot oneof additions.
      # Active from phase 1 onward (NOT deferred until ship).
      #
      # Placed after typecheck so a TS-side regression doesn't mask
      # proto-schema regressions (or vice versa) — both run independently.
      # `fetch-depth: 0` above guarantees the merge-base + future v0.3
      # tag are reachable without a second fetch.
      - name: Proto breaking-change gate (buf breaking)
        run: node packages/proto/scripts/breaking-check.mjs
        env:
          # CI hands us GITHUB_BASE_REF on PRs; the script reads it to
          # pick origin/$GITHUB_BASE_REF as the merge-base candidate.
          GITHUB_BASE_REF: ${{ github.base_ref }}

      # Build is required before `npm test` because the load-smoke harness
      # (tests/electron-load-smoke.test.ts) require()s dist/electron/*.js
      # to verify CJS load cleanliness. Without dist present, those tests
      # fail loud — see Task #764.
      - name: Build
        run: npm run build:app

      # Task #364 — merged separate Test + Coverage steps into one. Previously
      # `npm run test:app` (vitest run) and `npm run coverage` (vitest run
      # --coverage) ran the entire vitest suite twice (~106s on the second
      # pass). They use the same vitest config and same test set; --coverage
      # only attaches the v8 coverage provider. Single-pass run produces both
      # the test result AND the lcov artifact.
      #
      # Threshold enforcement: vitest.config.ts declares coverage.thresholds
      # for local dev visibility, but the R6 roll-out (Task #802) explicitly
      # says CI must not fail on threshold misses during the bake-in period.
      # We disable the thresholds in CI via `--coverage.thresholds.*=0`
      # overrides instead of `continue-on-error: true` — the latter would
      # silently eat real test failures (regression we'd never see). With
      # thresholds disabled, vitest only exits non-zero on actual test
      # failure or coverage instrumentation crash, which is exactly the
      # signal we want.
      - name: Test (with coverage)
        run: npm run test:app -- --coverage --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.branches=0 --coverage.thresholds.statements=0

      # Task #291 — pick up tools/**/*.spec.ts. The root vitest config
      # restricts `include` to `tests/**` + `electron/**/__tests__/**`,
      # so specs under tools/ (e.g. tools/test/check-v02-shrinking.spec.ts
      # added by Task #279, tools/test/installer-roundtrip-allowlist.spec.ts
      # added by Task T8.6, tools/spike-harness/snapshot-roundtrip.spec.ts
      # pinned by ch14 §1.B) were never executed in CI. They live outside
      # the root include on purpose (pure-node, no jsdom, no setup file)
      # and ship their own minimal config at tools/vitest.config.ts.
      # Wire-up extends the existing required `lint + typecheck + test`
      # job rather than adding a new required check (branch protection
      # is frozen). Was Linux-only pre-#322; runs on windows now since
      # the assertions are git/fs/process behaviour with no
      # platform-specific paths.
      - name: Test (tools/**/*.spec.ts)
        run: npx vitest run --config tools/vitest.config.ts

      # Tech-debt R6 (Task #802) — coverage roll-out. Coverage is now produced
      # by the Test step above (single vitest --coverage pass) instead of a
      # separate `npm run coverage` invocation that re-ran the full suite.
      # Thresholds are NOT enforced in CI — see Test step comments. This
      # step only uploads the lcov.info artifact emitted by that single pass.
      # (Task #364 merged the second vitest run.)
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      # Task #98 (T8.14a) — per-package coverage enforcement (chapter 12 §6).
      # Distinct from the root `coverage` step above (legacy renderer suite,
      # advisory only). These two steps are LIVE gates: they fail the PR if
      # the threshold drops.
      #
      # Daemon: 50% lines TEMPORARY (followup #350 raises to spec-mandated
      # 80%). Local run measures ~55% so the gate is real, not vacuous.
      # Uses a separate vitest config (vitest.config.coverage.ts) that
      # narrows include to unit specs only — integration suites under
      # packages/daemon/test/** must NOT count toward the unit gate per
      # chapter 12 §6.
      #
      # Electron: 60% lines LIVE. Renderer measures ~85% so this gate is
      # well-met today; threshold matches chapter 12 §6.
      # Repo's monorepo glue is turbo + pnpm-workspace.yaml on disk, but CI
      # installs with `npm ci` (see Install deps step) and the Windows runner
      # has no pnpm shim — the original `pnpm --filter @ccsm/<pkg>` invocation
      # fails with "pnpm: not recognized as a name of a cmdlet". The package
      # also lacks a top-level `npm workspaces` declaration, so
      # `npm test --workspace=...` errors with "No workspaces found". Cleanest
      # cross-platform invocation: cd into the package and run the locally
      # installed vitest via npx (resolves through the hoisted node_modules).
      #
      # Per-package devDeps not in the root install: the root `npm ci` only
      # installs deps from the root package.json — it ignores
      # `packages/*/package.json` because the root has no `workspaces` field
      # (intentional: pnpm-workspace.yaml is the source of truth, npm is just
      # CI's installer). Result: `cd packages/daemon && npx vitest` cannot
      # resolve daemon-only devDeps like `@connectrpc/connect-node` (imported
      # by src/rpc/router.ts → loaded by src/rpc/__tests__/router.spec.ts).
      # Locally `pnpm install` populates packages/daemon/node_modules/ via
      # symlink so the gap is invisible.
      #
      # Cannot `cd packages/daemon && npm install` — daemon's package.json
      # references `@ccsm/proto: workspace:*` and npm errors with
      # EUNSUPPORTEDPROTOCOL on the `workspace:` protocol. Instead, install
      # only the third-party deps the per-package vitest run needs into the
      # root node_modules tree (npm hoists single-package installs there;
      # node's import resolver finds them via parent-walk from
      # packages/daemon/). `--no-save` keeps the root package-lock.json
      # untouched. Pin the version to match packages/daemon/package.json
      # devDeps so the gate exercises the wire types the daemon ships with.
      - name: Install missing daemon devDeps for coverage gate
        run: npm install --no-save --no-audit --no-fund --legacy-peer-deps @connectrpc/connect-node@^2.1.1
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Coverage (daemon, unit only — temp 50% gate, see #350)
        working-directory: packages/daemon
        run: npx vitest run --coverage --config vitest.config.coverage.ts

      # Same per-package devDeps gap as daemon above. Electron's renderer
      # spec files use `@vitest-environment happy-dom` (declared in
      # packages/electron/devDependencies, not in root). Without happy-dom
      # vitest fails to start the worker for renderer .spec.tsx files with
      # "Cannot find package 'happy-dom'" — those specs silently drop out
      # of the coverage denominator (no 'failed' marker, just missing
      # files), making the renderer coverage tank from ~78% to ~44%.
      # Install the tagged version into root node_modules; node's resolver
      # finds it via parent-walk from packages/electron/.
      - name: Install missing electron devDeps for coverage gate
        run: npm install --no-save --no-audit --no-fund --legacy-peer-deps happy-dom@^15.11.7
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Coverage (electron renderer — 60% gate)
        working-directory: packages/electron
        run: npx vitest run --coverage

  # Task #79 / T7.8 — tools/sea-smoke/ post-install daemon end-to-end smoke.
  # Spec: docs/superpowers/specs/2026-05-03-v03-daemon-split-design.md ch10 §7.
  #
  # Runs the smoke harness on the three OSes the installer ships to. The
  # END-TO-END exercise (start service → /healthz → Hello → CreateSession
  # → Attach 'ok' → Stop) requires a real installed `ccsm-daemon` binary
  # placed by the per-OS installer + service registration; that wiring
  # lands with the e2e-installer-{win,mac,linux} self-hosted jobs (T7.4 /
  # T7.5 own the install side). This job runs the smoke binary's
  # typecheck on all three OSes so the harness itself never silently
  # breaks ahead of the installer jobs. When T7.4 wires the real
  # installer round-trip jobs, they will invoke
  # `pnpm --filter @ccsm/sea-smoke run smoke` AFTER the install step;
  # this job's matrix shape is identical so the wiring is one-line.
  #
  # Why three OS matrix even though no real daemon runs here yet: the
  # smoke uses platform-locked paths and service-manager commands
  # (lib/service-log.ts buildCaptureCommand). A POSIX-only typecheck
  # would let a Windows-only TypeScript or import regression slip in. Per
  # spec ch10 §6 the installer matrix is windows + macos + linux; this
  # job mirrors that explicitly.
  sea-smoke:
    name: sea-smoke (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      # Frozen lockfile — adding tools/sea-smoke as a workspace member
      # already updated pnpm-lock.yaml; further drift fails this step.
      - name: Install deps
        run: pnpm install --frozen-lockfile
      # Generate proto bindings so @ccsm/proto resolves during typecheck.
      - name: Generate proto
        run: pnpm --filter @ccsm/proto run gen
      - name: Typecheck sea-smoke harness
        run: pnpm --filter @ccsm/sea-smoke run typecheck
      # Sanity dry-run: invoke the harness with skipStart + skipStop +
      # an unreachable supervisor. The smoke MUST exit non-zero with the
      # `/healthz never returned 200` message — if it crashes earlier
      # (TypeScript ESM resolution / platform-paths typo / proto import
      # regression) the regression surfaces here without needing the
      # installer self-hosted runner. Exit-code is asserted via shell.
      - name: Dry-run (expect /healthz timeout)
        shell: bash
        working-directory: tools/sea-smoke
        run: |
          set +e
          node --import tsx -e "
          import('./main.ts').then(async (m) => {
            const code = await m.runSmoke({ skipStart: true, skipStop: true });
            process.exit(code === 1 ? 0 : 99);
          }).catch((e) => { console.error('import-fail', e); process.exit(98); });
          "

  # Task #15 / T0.9 — per-OS package job.
  # Spec: docs/superpowers/specs/2026-05-03-v03-daemon-split-design.md
  #       chapter 10 §6 (cross-OS build matrix), chapter 10 §7 (verify-signing),
  #       chapter 11 §6 (CI matrix sketch).
  #
  # Per spec ch11 §6:
  #
  #   package:
  #     needs: [daemon-test, electron-test]
  #     strategy:
  #       matrix:
  #         include:
  #           - { os: windows-latest, target: win-msi }
  #           - { os: macos-14,        target: mac-pkg }
  #           - { os: ubuntu-22.04,    target: linux-deb-rpm }
  #     runs-on: ${{ matrix.os }}
  #     steps:
  #       - run: pnpm run package:${{ matrix.target }}
  #       - run: bash tools/verify-signing.sh        # mac/linux
  #         if: matrix.os != 'windows-latest'
  #       - run: pwsh tools/verify-signing.ps1
  #         if: matrix.os == 'windows-latest'
  #
  # Implementation notes:
  #   * Per Task #322 the lint+typecheck+test job is windows-only by branch
  #     protection design, but the package job MUST run all three OSes — the
  #     installer artifacts ARE per-OS and there is no way to cross-build
  #     pkgbuild/productbuild (mac) or fpm-via-system-libs (linux) from
  #     windows. ubuntu-22.04 + macos-14 here are NOT a regression of #322;
  #     they are required by spec ch10 §6 build matrix and only run for the
  #     packaging stage, not the test stage.
  #   * `pnpm run package:<target>` chains: sign-{os} -> build-pkg-{os} ->
  #     verify-signing.{sh,ps1}. All three are placeholder-safe — missing
  #     EV cert / wix.exe / pkgbuild / fpm logs WARN and exits 0 (per
  #     project_v03_ship_intent: dogfood `npm run build` MUST NOT fail
  #     without certs). CI release jobs (v0.4) flip CCSM_VERIFY_SIGNING_STRICT=1
  #     to convert "missing tooling" into hard failure.
  #   * verify-signing is invoked again as an explicit final step (matching the
  #     spec sketch literally) so a regression where `package:<target>` stops
  #     calling it surfaces here. The package script ALSO calls verify-signing
  #     internally — running it twice is cheap (placeholder-safe scripts exit
  #     in <1s when no artifacts found).
  #   * Win MSI is authored with WiX 4 directly (PR #903 / Task #114 decision —
  #     electron-builder bundles WiX 3.x with no <ServiceInstall> hook). The
  #     wix.exe CLI is installed via `dotnet tool install --global wix` on the
  #     windows runner; build-msi.ps1 logs WARN + exits 0 when wix.exe is
  #     absent so non-CI hosts don't break.
  #   * Daemon binary (sea) and native staging are NOT built here yet — that
  #     wiring is owned by T9.x (build:sea + stage:native run before sign).
  #     For v0.3 ship the package job exercises the full sign->build-pkg->
  #     verify chain in placeholder-safe mode end-to-end. When sea+native
  #     land their CI step, prepend it to this job.
  package:
    name: package (${{ matrix.target }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: win-msi }
          - { os: macos-14,        target: mac-pkg }
          - { os: ubuntu-22.04,    target: linux-deb-rpm }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install deps
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # Generate proto bindings — daemon's tsc emit needs them present even
      # when the package step is placeholder-safe (the WARN/exit-0 paths still
      # import shared types).
      - name: Generate proto
        run: pnpm --filter @ccsm/proto run gen

      # WiX 4 unified CLI for Windows MSI. dotnet is preinstalled on
      # windows-latest GitHub-hosted runners. Skipped on non-windows.
      - name: Install WiX 4 (windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          dotnet tool install --global wix
          # Ensure the dotnet tools dir is on PATH for subsequent steps.
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      # fpm for Linux .deb / .rpm. Available as a ruby gem; ubuntu-22.04
      # GitHub-hosted runners ship ruby + rpm + dpkg-dev preinstalled.
      - name: Install fpm + rpm (linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-sig
          sudo gem install --no-document fpm

      # macOS pkgbuild / productbuild ship with the macos-14 runner image
      # (Xcode CLT preinstalled). No-op install step kept here as a marker.
      - name: macOS toolchain probe (mac only)
        if: matrix.os == 'macos-14'
        run: |
          command -v pkgbuild
          command -v productbuild

      # Run the per-OS package chain. Placeholder-safe: missing EV certs /
      # wix / fpm / pkgbuild surfaces as WARN + exit 0 inside the per-OS
      # scripts. CI release jobs (v0.4) override placeholder-safe by setting
      # CCSM_VERIFY_SIGNING_STRICT=1 to hard-fail on missing tooling.
      - name: Package (${{ matrix.target }})
        shell: bash
        run: pnpm run package:${{ matrix.target }}

      # Per spec ch11 §6 — explicit verify-signing invocation as the final
      # step so a regression where the package script stops calling it
      # surfaces here.
      - name: Verify signing (mac/linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: bash tools/verify-signing.sh

      - name: Verify signing (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pwsh tools/verify-signing.ps1

      # Upload whatever artifacts the package step produced (typically empty
      # in v0.3 placeholder-safe mode; populated once T9.x sea binary +
      # native staging lands). `if-no-files-found: warn` keeps the job green
      # in placeholder mode.
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-${{ matrix.target }}
          path: |
            packages/daemon/dist/*.msi
            packages/daemon/dist/*.pkg
            packages/daemon/dist/*.deb
            packages/daemon/dist/*.rpm
          if-no-files-found: warn
          retention-days: 7

  # Task #427 — chapter 15 §3 forbidden-pattern enforcement.
  #
  # Spec: docs/superpowers/specs/2026-05-03-v03-daemon-split-design.md
  #       chapter 15 §3 (forbidden patterns 1-29) — the mechanical reviewer
  #       checklist that v0.4 PRs must clear. Several of those items have
  #       on-disk enforcement artifacts (proto unit tests, packages/proto
  #       lock.json gate, tools/check-migration-locks.sh, the audit-table
  #       revalidate script) that landed in earlier waves but were never
  #       wired into CI — they were sitting on disk firing zero PRs.
  #
  # Why a separate job (not folded into lint-typecheck-test):
  #   * lint-typecheck-test installs via `npm ci --legacy-peer-deps` because
  #     the windows-latest runner historically lacked a pnpm shim AND
  #     packages/daemon/package.json's `workspace:*` protocol is npm-illegal
  #     (see comments around line 259-275 in this file). That job therefore
  #     CANNOT invoke `pnpm --filter @ccsm/<pkg>` — the shell will fail
  #     with "pnpm: not recognized as a name of a cmdlet".
  #   * Mirroring the sea-smoke / package job pattern (pnpm/action-setup +
  #     `pnpm install --frozen-lockfile`) is the cleanest path.
  #   * runs-on: windows-latest because packages/proto/lock.json records
  #     SHA256 over RAW on-disk bytes with NO line-ending normalization
  #     (per packages/proto/test/lock.spec.ts comment "no normalization").
  #     The lock.json values were generated on a Windows checkout (CRLF
  #     line endings); a Linux runner would re-checkout the .proto files
  #     with LF and recompute different hashes, failing test/lock.spec.ts
  #     with phantom "drift" on every PR. Pinning this job to
  #     windows-latest mirrors lint-typecheck-test's matrix choice
  #     (Task #322) and the .gitattributes default for this repo.
  #   * Coverage rationale per ch15 §3 item:
  #       - item 1, 2, 19, 20 (proto rename / renumber / oneof slot)
  #         → buf breaking already wired in lint-typecheck-test (line 184).
  #       - item 4 (v0.3 migration sql immutability)
  #         → tools/check-migration-locks.sh (this job, gh CLI required).
  #       - item 23 (lock.json must bump with every .proto edit)
  #         → packages/proto/scripts/lock-check.mjs (this job).
  #       - items 3, 7, 26, 27, 28, 29 + various spec invariants
  #         → packages/proto vitest suite (`pnpm --filter @ccsm/proto run test`)
  #           — covers wire-shape round-trip, error-detail, open-string
  #           tolerance, principalKey colon split, segmentation cadence,
  #           perf-budgets-locked, etc. (8 spec files / 53 tests today).
  #       - per-PR audit verdict re-validation
  #         → tools/audit-table-revalidate.sh (this job; reads ch15 §1/§2
  #           tables AND the PR's touched-file set).
  #
  # Daemon test wiring is INTENTIONALLY DEFERRED — see TODO comment below.
  ch15-enforcement:
    name: ch15 §3 enforcement
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Same fetch-depth: 0 reasoning as lint-typecheck-test — buf
          # breaking and the audit-table-revalidate script may need to
          # resolve merge-base against origin/<base>. Cheap on this small
          # repo.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install deps
        run: pnpm install --frozen-lockfile
        env:
          # Skip electron binary download — none of the steps below need it
          # and it's the dominant install cost on a cold runner.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # Generated TS bindings are not checked in (gen/ts/ is .gitignored
      # per packages/proto convention). Required by the proto vitest
      # suite which imports the generated message types.
      - name: Generate proto bindings
        run: pnpm --filter @ccsm/proto run gen

      # ch15 §3 items 3, 7, 26, 27 (and others) — proto-shape invariants
      # asserted by the @ccsm/proto vitest suite. 8 spec files cover
      # error-detail round-trip, open-string tolerance, principalKey
      # colon-split, segmentation-cadence single-source, perf-budgets-locked
      # markdown-table parse, etc.
      - name: Proto package tests (ch15 §3 #3, #7, #26, #27)
        run: pnpm --filter @ccsm/proto run test

      # ch15 §3 item 23 — every .proto edit MUST bump the matching SHA256
      # entry in packages/proto/lock.json in the same PR. lock-check.mjs
      # recomputes hashes and fails on drift.
      - name: Proto lock-check (ch15 §3 #23)
        run: pnpm --filter @ccsm/proto run lock-check

      # ch15 §3 item 4 — v0.3 migration files (packages/daemon/src/db/
      # migrations/*.sql) are immutable post-tag. The script is
      # placeholder-safe pre-tag: it exits 0 with a notice when v0.3.0
      # release does not yet exist (which is the case during v0.3 ship
      # work). Post-tag, any SHA256 drift fails the PR mechanically.
      # GH_TOKEN required by `gh release view` invocation inside the
      # script.
      - name: Migration-file lock-check (ch15 §3 #4)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tools/check-migration-locks.sh

      # Per-PR re-validation of the chapter 15 §1/§2 audit verdicts: the
      # script enumerates forever-stable file paths from the design spec
      # and asserts the PR's touched-file set does not modify them
      # without an explicit `audit-override: <path> — <reason>` marker
      # in the PR body. workflow_dispatch runs (no PR number) skip the
      # check via the `--diff` fallback against the merge-base.
      - name: Audit-table revalidate (ch15 §1/§2)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            bash tools/audit-table-revalidate.sh --pr ${{ github.event.pull_request.number }}
          else
            # workflow_dispatch / push: fall back to diff vs merge-base.
            BASE_REF="${GITHUB_BASE_REF:-working}"
            bash tools/audit-table-revalidate.sh --diff "origin/${BASE_REF}...HEAD"
          fi

      # TODO(Task #427 followup): wire `pnpm --filter @ccsm/daemon run test`
      # here. Verified locally on Windows host on 2026-05-05: the daemon
      # vitest suite has 7 pre-existing failures in
      # src/rpc/__tests__/integration.spec.ts (h2c-loopback bind),
      # test/integration/{crash-getlog,crash-watch,watch-sessions}-wired.spec.ts,
      # and test/pty-host/test-crash-integration.spec.ts — all with
      # 10s/30s afterEach hook timeouts on the loopback HTTP/2 path.
      # These are baseline issues on origin/working (commit fa6b1e1), not
      # introduced by Task #427, and gating PR merges on them would block
      # every v0.3 ship PR. Wiring is deferred to a followup that first
      # stabilizes the integration suite. ch15 §3 items the daemon suite
      # would back-stop (#5 SnapshotV1 layout, #6 listener slot array,
      # #18 listeners[1] writer rule, #25 child_process boundary, etc.)
      # remain covered by direct daemon-side .spec.ts files that do pass;
      # what we lose by deferring is integration-level wire coverage, not
      # ch15 enforcement.
