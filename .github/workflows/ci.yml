name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Build shared (required for typecheck of dependents)
        run: pnpm -F @ccsm/shared build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

  e2e:
    needs: build
    runs-on: ubuntu-latest
    # Linux-only for now: Playwright Chromium download is heavy (~150MB) and
    # Windows e2e is opt-in via T12. The smoke spec is OS-agnostic.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Install claude CLI (required by daemon node-pty spawn)
        # T7 p1-smoke spawns a real `claude` PTY via the daemon; the CLI must
        # be on PATH for node-pty to find it. We pin a recent version rather
        # than `latest` so CI failures point at code changes, not silent CLI
        # behaviour drift.
        run: npm install -g @anthropic-ai/claude-code@2.1.131

      - name: Build
        run: pnpm -r build

      - name: Run e2e (rig + strictmode only on CI; p1-smoke needs claude auth)
        # p1-smoke spawns the real `claude` CLI which requires interactive
        # auth on first run. CI runners have no Anthropic credentials and no
        # way to seed `~/.claude/`, so the PTY exits immediately and the
        # walking-skeleton assertions can't run. The acceptance evidence for
        # T7 lives in the PR description (snapshots taken on the dev's box,
        # uploaded for manager multimodal review). On CI we still run the
        # rig smoke + strictmode dev-mode spec to keep the harness honest.
        run: pnpm -F @ccsm/e2e exec playwright test --grep-invert p1-smoke

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-snapshots
          path: packages/e2e/snapshots/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: packages/e2e/playwright-report/
          if-no-files-found: ignore
