name: ci

on:
  pull_request:
    branches: [main, working]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [main, working]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  schedule:
    # T14 (#681): nightly Windows tauri build at 08:00 UTC. Rust toolchain
    # warm-up + tauri build is ~10 min; running it on every PR is wasteful.
    # Nightly + workflow_dispatch + push-to-main is enough to catch regressions
    # without blocking PR cycle.
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Build shared + core + ui (required for typecheck of dependents)
        run: pnpm -F @ccsm/shared build && pnpm -F @ccsm/core build && pnpm -F @ccsm/ui build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Tauri shell guard (Task #711, S2-T10) — frontend-tauri must never reference Pages
        # Architectural red-line: the Tauri desktop shell embeds frontend-web
        # and loads loopback daemon; it must NEVER fetch https://cc-sm.pages.dev.
        # See DESIGN.md §11 Deployment Topologies. Any hit here is a regression.
        shell: bash
        run: |
          set -e
          fail=0
          for pat in 'pages\.dev' 'cc-sm' 'Pages'; do
            hits=$(git grep -nE "$pat" -- packages/frontend-tauri/ || true)
            if [ -n "$hits" ]; then
              echo "::error::Tauri shell guard tripped — pattern '$pat' found in packages/frontend-tauri/:"
              echo "$hits"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "Tauri shell guard OK — no Pages references in packages/frontend-tauri/."

  e2e:
    needs: build
    # T12 (#655): cross-platform e2e matrix. macOS is intentionally NOT in the
    # matrix — keeping CI cost down for v0.1.0; see README "Platform support"
    # for the contributions-welcome note.
    #
    # Task #787 follow-up (PR #1170): e2e is currently red on working baseline
    # (independent of any in-flight PR). Marked continue-on-error so the job
    # still runs (artifacts + logs preserved) but does not block PR check
    # rollup. User runs e2e manually for now. Remove this line once the
    # baseline regression is fixed to restore gating.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium everywhere; +firefox+webkit on windows)
        # Task #766: ubuntu/macos run --project chromium only, so the default
        # `pnpm e2e:install` (which installs only chromium) is enough there.
        # windows-latest runs the full 4-browser matrix from
        # playwright.config.ts, so it additionally needs firefox + webkit
        # binaries. edge uses the system Edge install on windows runners and
        # does not need a playwright download.
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm -F @ccsm/e2e-web exec playwright install chromium firefox webkit
          else
            pnpm e2e:install
          fi

      - name: Install claude CLI (required by daemon node-pty spawn)
        # T7 p1-smoke spawns a real `claude` PTY via the daemon; the CLI must
        # be on PATH for node-pty to find it. We pin a recent version rather
        # than `latest` so CI failures point at code changes, not silent CLI
        # behaviour drift. p1-smoke + p3-stress still skip on CI (no Anthropic
        # credentials), but other specs use the rig.
        run: npm install -g @anthropic-ai/claude-code@2.1.131

      - name: Build
        run: pnpm -r build

      - name: 'Run e2e (excludes p1-smoke + p3-stress + session-persistence + s2-pages-loopback: all need authed claude)'
        # p1-smoke + p3-stress + session-persistence + s2-pages-loopback spawn the
        # real `claude` CLI which requires interactive auth on first run. CI
        # runners have no Anthropic credentials and no way to seed
        # `~/.claude/`, so the PTY exits immediately and the assertions can't
        # run. Acceptance evidence for T7 / T12 / S2-T9 / Task #751 lives in
        # the PR description (snapshots taken on the dev's box, uploaded for
        # manager multimodal review). The dedicated s2-acceptance CI job that
        # runs ON a credentialled matrix runner is Task #755 (E in the S2
        # split). On CI we still run the rig smoke + strictmode + groups +
        # scrollback specs to keep the harness honest on BOTH ubuntu and
        # windows.
        # `shell: bash` so the `|` in the regex is parsed by bash, not by
        # PowerShell on windows-latest (where `|` would be a pipeline).
        #
        # Task #766: ubuntu/macos limit to --project chromium. PR #1151 added
        # firefox/webkit/edge projects to playwright.config.ts; firefox/webkit
        # fail on ubuntu (vendor gap: WebKit HTTPS->loopback mixed-content +
        # no PNA, firefox lacks the same loopback exception). Windows still
        # runs the full 4-browser matrix to keep cross-browser coverage.
        shell: bash
        env:
          CI: 'true'
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm -F @ccsm/e2e-web exec playwright test --grep-invert "p1-smoke|p3-stress|session-persistence|s2-pages-loopback"
          else
            pnpm -F @ccsm/e2e-web exec playwright test --grep-invert "p1-smoke|p3-stress|session-persistence|s2-pages-loopback" --project chromium
          fi

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-snapshots-${{ matrix.os }}
          path: packages/e2e/snapshots/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report-${{ matrix.os }}
          path: packages/e2e/playwright-report/
          if-no-files-found: ignore

  s2-acceptance:
    # Task #763 (S2-closeout-E): dedicated job for s2-pages-loopback +
    # s2-spoof-origin specs, which the main `e2e` job excludes via
    # `--grep-invert s2-pages-loopback` (because pre-#763 the spec needed
    # an authed `claude` CLI with no CI credentials path, and was only run
    # in PRs that touched the spec). This job re-includes them on a clean
    # matrix runner so working tip always has cross-OS evidence the S2
    # cross-origin chain (CORS + PNA + classifyOrigin) actually holds.
    # chromium-only: firefox/webkit/edge ran locally on Windows in #752 and
    # are not in the CI cost budget (webkit additionally test.skip()s the
    # loopback spec — see s2-pages-loopback.spec.ts header).
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm e2e:install

      - name: Install claude CLI (required by daemon node-pty spawn in s2-pages-loopback)
        # s2-pages-loopback step 7 spawns a real `claude` PTY through the
        # daemon to drive the keystroke INPUT → OUTPUT echo assertion. The
        # CLI must be on PATH for node-pty to find it. Pinned (not `latest`)
        # so failures point at code changes, not silent CLI behaviour drift.
        run: npm install -g @anthropic-ai/claude-code@2.1.131

      - name: Build
        run: pnpm -r build

      - name: Run s2-acceptance specs (s2-pages-loopback + s2-spoof-origin, chromium)
        # `shell: bash` so the `|` in the grep regex is parsed by bash, not
        # by PowerShell on windows-latest (where `|` is a pipeline operator).
        shell: bash
        env:
          CI: 'true'
        run: pnpm -F @ccsm/e2e-web exec playwright test --grep "s2-pages-loopback|s2-spoof-origin" --project chromium

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s2-acceptance-snapshots-${{ matrix.os }}
          path: packages/e2e/snapshots/
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s2-acceptance-playwright-report-${{ matrix.os }}
          path: packages/e2e/playwright-report/
          if-no-files-found: ignore

  e2e-tauri:
    # Task #723 [S1-followup]: Tauri 2 desktop smoke via tauri-driver +
    # WebDriverIO. Windows-only (Tauri 2 webview = WebView2 = Edge, driven by
    # msedgedriver pre-installed on `windows-latest`). Runs only on
    # workflow_dispatch / schedule / push-to-main because the debug `tauri
    # build` Rust compile is ~10 min cold (cached subsequent), too slow for
    # every PR. swatinem/rust-cache hot path keeps reruns under ~3 min.
    #
    # Architecture:
    #   wdio  ──HTTP──>  tauri-driver (port 4444)  ──spawns──>  msedgedriver
    #                                              ──launches──> ccsm-tauri.exe
    # Spec scope = react-shell-mounts smoke (no daemon API click), per
    # packages/e2e-tauri/tests/smoke.spec.ts header doc.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust toolchain (stable msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/frontend-tauri/src-tauri -> target

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache cargo bin (tauri-driver)
        # `cargo install tauri-driver` is ~3 min cold; cache the built binary
        # keyed on the cargo registry index so it survives until tauri-driver
        # ships an upstream release.
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver.exe
          key: cargo-bin-tauri-driver-v2-${{ runner.os }}

      - name: Install tauri-driver (if not cached)
        shell: bash
        run: |
          if [ ! -f "$HOME/.cargo/bin/tauri-driver.exe" ]; then
            cargo install tauri-driver --locked
          else
            echo "tauri-driver cached at $HOME/.cargo/bin/tauri-driver.exe"
          fi

      - name: Build workspace (shared/core/ui/daemon required by tauri build)
        run: pnpm -r build

      - name: Tauri build (debug)
        # Debug build is ~3 min on hot rust-cache (vs ~10 min release for
        # the nightly `tauri-build` job). Smoke spec only needs the .exe;
        # no .msi packaging, so debug profile suffices.
        run: pnpm -F @ccsm/frontend-tauri tauri build --debug

      - name: Run e2e-tauri smoke
        shell: bash
        env:
          # wdio.conf.ts defaults TAURI_E2E_APP to target/release; we built
          # debug, so override. msedgedriver.exe is pre-installed on
          # `windows-latest` runners under C:/Program Files (x86)/Microsoft/Edge/Application
          # but the simpler path is the bundled one in `C:/SeleniumWebDrivers/EdgeDriver/msedgedriver.exe`.
          TAURI_E2E_APP: ${{ github.workspace }}/packages/frontend-tauri/src-tauri/target/debug/ccsm-tauri.exe
          TAURI_E2E_MSEDGEDRIVER: C:/SeleniumWebDrivers/EdgeDriver/msedgedriver.exe
        run: pnpm -F @ccsm/e2e-tauri test

  tauri-build:
    # T14 (#681): nightly Windows tauri build producing the .msi artifact.
    # Skipped on pull_request (Rust compile is ~10 min and blocks PR cycle);
    # runs on schedule (nightly), workflow_dispatch (manual), and push to main.
    # NOT in the e2e matrix — actually packaging the .msi is independent of
    # the per-PR build/e2e jobs.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust toolchain (stable msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/frontend-tauri/src-tauri -> target

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace (shared/core/ui/daemon — Tauri sidecar + frontend deps)
        # Tauri build needs shared/core/ui dist for frontend-tauri's vite build
        # and daemon dist for any future sidecar bundling (V0.5). Cheaper to do
        # one ordered `-r build` than to enumerate and risk ordering bugs.
        run: pnpm -r build

      - name: Tauri build (.msi)
        run: pnpm -F @ccsm/frontend-tauri tauri build

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccsm-tauri-msi
          path: packages/frontend-tauri/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

  tauri-red-line-guard:
    # Architecture principle (docs/ROADMAP.md): Web and Tauri are parallel
    # surfaces; Tauri is NOT on the cloud data path. This guard greps
    # frontend-tauri sources for Cloudflare Pages/Workers references that
    # would violate that principle (e.g. fallback to cc-sm.pages.dev,
    # wss:// to *.pages.dev / *.workers.dev). Single-OS job is enough —
    # this is a static text check, not a build.
    name: Tauri red-line guard (no cloud refs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grep frontend-tauri for cloud references
        shell: bash
        run: |
          set +e
          hits=$(grep -rE 'cc-sm\.pages\.dev|wss://[^"'\'' ]*\.pages\.dev|wss://[^"'\'' ]*\.workers\.dev' \
            packages/frontend-tauri/src/ packages/frontend-tauri/src-tauri/src/ 2>/dev/null)
          if [ -n "$hits" ]; then
            echo "::error::frontend-tauri must NOT reference Cloudflare Pages/Workers (architecture principle, see docs/ROADMAP.md)"
            echo "$hits"
            exit 1
          fi
          echo "Tauri red-line guard: clean (0 hits)"
