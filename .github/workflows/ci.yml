name: CI

on:
  # No paths-ignore: branch protection requires the three
  # `lint + typecheck + test (*)` contexts this workflow produces. A path
  # filter that skips the workflow leaves those required contexts pending
  # forever, deadlocking doc-only PRs (DEBT.md #20). Jobs run against a warm
  # node_modules cache, so doc-only PRs pay only the cheap lint/type/test pass.
  #
  # No `branches:` filter: CI runs on PRs targeting any base branch, so
  # feature/integration branches (e.g. the mobile-remote work, which collects
  # its sub-PRs before squashing to main) get the same coverage as main.
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Linux native builds for better-sqlite3 need python + build tools; the
      # GitHub-hosted ubuntu image already has them, but setup-python makes
      # it explicit and pins the version so upstream image changes don't
      # surprise us.
      # Pinned to 3.11 because 3.12+ removed the distutils stdlib (PEP 632)
      # which the older node-gyp invoked by better-sqlite3's postinstall
      # still imports. Bump back when better-sqlite3 ships node-gyp >= 10.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache node_modules directly (not ~/.npm) — `npm ci --legacy-peer-deps`
      # on Windows is the dominant CI cost (~178s = 49% of total wall-clock,
      # eval #877). Restoring node_modules verbatim skips install + native
      # rebuilds (better-sqlite3, node-pty) baked into the cached tree.
      # Key includes os/arch/node major + lockfile hash so any dep change
      # busts the cache. Native ABI for Node-side tests is re-aligned by the
      # `npm rebuild better-sqlite3` step below, which always runs.
      - name: Cache node_modules
        id: nm_cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ runner.arch }}-node20-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        if: steps.nm_cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps
        env:
          # electron-builder's postinstall needs this env to not fail on
          # first install when the Electron binary cache is cold.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      # Rebuild better-sqlite3 against Node (tests run under node, not
      # electron). The electron-builder `postinstall` above builds for the
      # electron ABI; we overwrite with the node ABI for CI tests here.
      - name: Rebuild better-sqlite3 for Node
        run: npm rebuild better-sqlite3

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Build is required before `npm test` because the load-smoke harness
      # (tests/electron-load-smoke.test.ts) require()s dist/electron/*.js
      # to verify CJS load cleanliness. Without dist present, those tests
      # fail loud — see Task #764.
      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Tech-debt R6 (Task #802 / Task #43) — coverage gate. Runs only on
      # Linux to keep the matrix lean (coverage instrumentation roughly
      # doubles wall-clock; one OS is enough for the lcov artifact and
      # the gate). Threshold misses now fail CI — see vitest.config.ts
      # for the configured floors and PR #(this) for the rationale.
      - name: Coverage
        if: matrix.os == 'ubuntu-latest'
        run: npm run coverage

      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  # The Cloudflare Worker (mobile-remote signaling relay) lives in its own
  # package under `cloudflare/` with a separate dependency tree. Its miniflare
  # test harness exercises a Durable Object backed by workerd SQLite. The suite
  # is green on every OS (verified locally on Windows too); it runs on Linux
  # only here to keep the matrix lean — it is a self-contained package, so one
  # OS is enough to prove the harness and typecheck.
  cloudflare-worker:
    name: cloudflare worker (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cloudflare/package-lock.json

      - name: Install deps
        working-directory: cloudflare
        run: npm ci

      - name: Typecheck
        working-directory: cloudflare
        run: npm run typecheck

      - name: Test
        working-directory: cloudflare
        run: npm test
