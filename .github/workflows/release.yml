name: Release

# Triggered by version tag pushes (vX.Y.Z) or manual dispatch for dry-runs.
# Artifacts are published to a draft GitHub Release on real tag pushes only;
# workflow_dispatch runs stop after the artifact upload so dry-runs don't
# pollute the Releases tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.0-dryrun)'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: npm ci --legacy-peer-deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - name: Rebuild better-sqlite3 for Node
        run: npm rebuild better-sqlite3
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  build:
    name: build (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Guard against a mismatch between the git tag and package.json version —
      # e.g. someone tags v0.2.0 but forgot to bump version. Skipped on
      # workflow_dispatch so dry-runs (v0.0.0-dryrun tag input) don't fail.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG mismatches package.json version $PKG"
            exit 1
          fi
          echo "tag v$TAG matches package.json $PKG"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        run: npm ci --legacy-peer-deps

      # Warn (don't fail) if signing secrets aren't configured. The build
      # still produces artifacts — just unsigned. Tracked per non-negotiable:
      # "builds MUST continue unsigned if absent".
      - name: Detect signing secrets
        id: secrets
        shell: bash
        run: |
          missing=()
          if [ "${{ matrix.platform }}" = "win" ] || [ "${{ matrix.platform }}" = "mac" ]; then
            if [ -z "${{ secrets.CSC_LINK }}" ]; then missing+=(CSC_LINK); fi
            if [ -z "${{ secrets.CSC_KEY_PASSWORD }}" ]; then missing+=(CSC_KEY_PASSWORD); fi
          fi
          if [ "${{ matrix.platform }}" = "mac" ]; then
            if [ -z "${{ secrets.APPLE_ID }}" ]; then missing+=(APPLE_ID); fi
            if [ -z "${{ secrets.APPLE_ID_PASSWORD }}" ]; then missing+=(APPLE_ID_PASSWORD); fi
            if [ -z "${{ secrets.APPLE_TEAM_ID }}" ]; then missing+=(APPLE_TEAM_ID); fi
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning title=Unsigned build::Missing signing secrets: ${missing[*]}. Build will continue unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          else
            echo "signed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web + electron
        run: npm run build

      # Build the standalone daemon binary (frag-11 §11.5 step 2 + §11.1
      # Task 20). Produces daemon/dist/ccsm-daemon-${platform}-${arch}${ext}
      # for the host runner via @yao-pkg/pkg, with native modules
      # (better-sqlite3, node-pty, ccsm_native) rebuilt against Node 22 ABI
      # and staged into daemon/native/${platform}-${arch}/ for the
      # before-pack hook to copy into the installer payload.
      - name: Build daemon binary
        run: npm run build:daemon-bin

      # electron-builder invocation per OS. `--publish never` because we
      # upload via softprops/action-gh-release below — that gives us a
      # single source of release metadata and keeps `publish: github` in
      # package.json reserved for the update feed only.
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Skip notarization if Apple creds missing — electron-builder
          # reads these env vars and falls back to unsigned when empty.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.secrets.outputs.signed == 'true' && 'true' || 'false' }}

      - name: Warn on unsigned Windows build
        if: matrix.platform == 'win' && steps.secrets.outputs.signed != 'true'
        shell: bash
        run: |
          echo "::warning title=Unsigned Windows build::CSC_LINK / CSC_KEY_PASSWORD not set. The produced installer is unsigned — users will see a SmartScreen warning on first launch."

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # Phase 3 crash observability (spec §5.4 / §6, plan Task 10).
      # Symbol upload to the per-surface Sentry projects. The
      # afterAllArtifactBuild hook already fires inside electron-builder
      # above; this step is a belt-and-suspenders re-run so a workflow
      # change to skip the hook (e.g. `--publish=onTag`) doesn't silently
      # drop symbol uploads. Skipped when SENTRY_AUTH_TOKEN is unset
      # (PR / fork builds, dry-runs without the release secret plugged in).
      #
      # Post-pkg layout (audit 3 F1 / PR #781): the daemon source-of-truth
      # for sourcemaps is `daemon/dist-daemon-bundle/index.cjs(.map)` (the
      # esbuild CJS bundle pkg ingests) PLUS the raw tsc emit at
      # `daemon/dist-daemon/`. Daemon native symbols (.node + .pdb / dSYM)
      # are picked up from `daemon/native/<platform>-<arch>/`. The script
      # auto-discovers all of these, so this step needs no extra inputs.
      - name: Upload symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT_RENDERER: ${{ vars.SENTRY_PROJECT_RENDERER }}
          SENTRY_PROJECT_MAIN: ${{ vars.SENTRY_PROJECT_MAIN }}
          SENTRY_PROJECT_DAEMON: ${{ vars.SENTRY_PROJECT_DAEMON }}
        run: node scripts/sentry-upload-symbols.cjs

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ccsm-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  # T59 (v0.3 frag-11 §11.4 + §11.4.1): release attestation — for every
  # installer artifact we publish three sidecar files alongside it:
  #   <artifact>.sha256          SHA-256 hash (integrity vs network corruption)
  #   <artifact>.intoto.jsonl    SLSA L3 provenance attestation (authenticity vs
  #                              compromised pipeline; signed by GitHub OIDC root
  #                              via the SLSA reusable workflow)
  #   <artifact>.minisig         Linux minisign signature (offline verifier on
  #                              the daemon-only updater + initial-install path)
  #
  # The attest stage runs a single `release-publish`-style job that downloads
  # every matrix leg's artifacts, computes SHA + minisign sidecars locally, then
  # hands the SHA hashes to the SLSA reusable workflow which produces a single
  # signed `*.intoto.jsonl`. The `publish` job verifies all three sidecars
  # exist for every installer artifact (sidecar-verify gate) before uploading
  # to the GitHub Release.
  attest:
    name: SHA + minisign sidecars
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      # Flatten dist-all/<matrix-name>/<files> -> dist-flat/<files> so sidecar
      # filenames sit beside their parent. The SLSA generator + GitHub Release
      # upload both want a single flat directory.
      - name: Flatten artifact layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-flat
          find dist-all -type f \( \
              -name '*.exe' -o -name '*.dmg' -o -name '*.zip' \
              -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
              -o -name 'latest*.yml' -o -name '*.blockmap' \
            \) -exec cp -n {} dist-flat/ \;
          ls -la dist-flat/

      # Per-artifact .sha256 sidecar. Format matches `sha256sum` output so
      # downstream verifiers can `sha256sum -c <file>.sha256`.
      - name: Generate SHA-256 sidecars
        shell: bash
        run: |
          set -euo pipefail
          cd dist-flat
          for f in *.exe *.dmg *.zip *.AppImage *.deb *.rpm; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
            echo "wrote $f.sha256"
          done

      # Minisign signatures. Public key lives in repo at release-keys/minisign.pub
      # (committed). Private key is provisioned via the MINISIGN_PRIVATE_KEY
      # repo secret + MINISIGN_PASSWORD secret (see release-keys/README.md for
      # rotation runbook). When the secret is absent we skip sidecar generation
      # entirely and the publish job's sidecar-verify gate skips its minisig
      # check accordingly — matching the v0.3 ship-intent "placeholder-safe"
      # rule (frag-11 §11.5(5): "MUST continue unsigned if absent") and the
      # Apple/signtool steps' existing fall-back-to-unsigned behaviour.
      - name: Install minisign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends minisign

      - name: Generate minisign signatures
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_PRIVATE_KEY:-}" ]; then
            echo "::warning title=Unsigned release::MINISIGN_PRIVATE_KEY secret not set. Skipping .minisig sidecar generation; the publish job's sidecar-verify gate will skip its minisig check. See release-keys/README.md for provisioning."
            exit 0
          fi
          umask 077
          KEY=$(mktemp)
          printf '%s' "$MINISIGN_PRIVATE_KEY" > "$KEY"
          cd dist-flat
          for f in *.exe *.dmg *.zip *.AppImage *.deb *.rpm; do
            [ -f "$f" ] || continue
            echo "$MINISIGN_PASSWORD" | minisign -S -s "$KEY" -m "$f" -t "ccsm $GITHUB_REF_NAME"
            echo "wrote $f.minisig"
          done
          shred -u "$KEY"

      # Compute the SLSA hashes input. The SLSA reusable workflow expects a
      # base64-encoded SHA256SUMS-format payload listing every subject we want
      # provenance over (the installers themselves; sidecars are derivative).
      - name: Compute SLSA hashes input
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          cd dist-flat
          HASHES=$( \
            sha256sum *.exe *.dmg *.zip *.AppImage *.deb *.rpm 2>/dev/null \
              | base64 -w0 \
          )
          echo "hashes=$HASHES" >> "$GITHUB_OUTPUT"

      - name: Upload sidecars + installers
        uses: actions/upload-artifact@v4
        with:
          name: ccsm-attested
          path: dist-flat/**
          if-no-files-found: error
          retention-days: 14

  # SLSA L3 provenance via the official reusable workflow. This produces a
  # single signed `<workflow-name>.intoto.jsonl` whose subjects cover every
  # installer artifact (one provenance file documents the entire release —
  # this is the SLSA spec's canonical shape; per-artifact provenance is not
  # required and would be redundant). The `publish` job renames a copy to
  # `<artifact>.intoto.jsonl` for each installer so the README's
  # "verify your download" workflow stays one-pattern.
  #
  # `upload-assets: false` is intentional: we don't want the SLSA reusable
  # workflow to push to a GitHub Release directly. Instead the downstream
  # `publish` job downloads the provenance artifact, runs the sidecar-verify
  # gate (every installer must have .sha256 + .minisig + .intoto.jsonl), and
  # only then uploads to a draft Release via `softprops/action-gh-release`.
  # This puts the verification step between provenance generation and
  # release publication so a missing-sidecar bug can't ship.
  provenance:
    name: SLSA L3 provenance
    needs: attest
    if: needs.attest.outputs.hashes != ''
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.attest.outputs.hashes }}
      provenance-name: ccsm.intoto.jsonl
      upload-assets: false

  publish:
    name: Sidecar-verify gate + GitHub Release upload
    needs: [attest, provenance]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download attested artifacts + sidecars
        uses: actions/download-artifact@v4
        with:
          name: ccsm-attested
          path: dist-flat

      - name: Download SLSA provenance
        uses: actions/download-artifact@v4
        with:
          # The SLSA generic generator's reusable workflow exposes
          # `provenance-name` as both the artifact name uploaded to the
          # workflow run and the filename inside it (they're set to the
          # same string from the `provenance-name` input we pass above —
          # `ccsm.intoto.jsonl`). Use that output here so this stays in
          # sync if we ever rename the input.
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: dist-flat

      # Sidecar-verify gate: every installer must have all three sidecars
      # present (and the minisig must be non-empty). This is the post-tag-push
      # safety check that catches "someone commented out a sidecar step in a
      # rebase" before we publish a release with missing attestations.
      #
      # Placeholder-safe: when MINISIGN_PRIVATE_KEY is unset (e.g. forks, or
      # repos that haven't provisioned a minisign keypair yet), the attest job
      # skips writing .minisig sidecars. Mirror that here by skipping the
      # minisig portion of the gate so unsigned releases can still publish —
      # spec frag-11 §11.5(5): "MUST continue unsigned if absent".
      - name: Sidecar-verify gate
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          cd dist-flat
          PROV=$(ls *.intoto.jsonl 2>/dev/null | head -n1 || true)
          if [ -z "$PROV" ]; then
            echo "::error title=Sidecar-verify failed::no *.intoto.jsonl SLSA provenance file present"
            exit 1
          fi
          if [ -z "${MINISIGN_PRIVATE_KEY:-}" ]; then
            check_minisig=0
            echo "::warning title=Unsigned release::MINISIGN_PRIVATE_KEY secret not set; skipping .minisig sidecar verification."
          else
            check_minisig=1
          fi
          fail=0
          for f in *.exe *.dmg *.zip *.AppImage *.deb *.rpm; do
            [ -f "$f" ] || continue
            if [ ! -s "$f.sha256" ]; then
              echo "::error title=Sidecar-verify failed::$f missing or empty .sha256"; fail=1
            fi
            if [ "$check_minisig" -eq 1 ] && [ ! -s "$f.minisig" ]; then
              echo "::error title=Sidecar-verify failed::$f missing or empty .minisig"; fail=1
            fi
            # Materialize a per-artifact intoto.jsonl alias so the README's
            # one-pattern verify command works for every download.
            cp "$PROV" "$f.intoto.jsonl"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Refusing to publish release with missing sidecars."
            exit 1
          fi
          if [ "$check_minisig" -eq 1 ]; then
            echo "All installers have .sha256 + .minisig + .intoto.jsonl sidecars."
          else
            echo "All installers have .sha256 + .intoto.jsonl sidecars (minisig skipped — secret unset)."
          fi
          ls -la

      - name: Upload to GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist-flat/*.exe
            dist-flat/*.dmg
            dist-flat/*.zip
            dist-flat/*.AppImage
            dist-flat/*.deb
            dist-flat/*.rpm
            dist-flat/latest*.yml
            dist-flat/*.blockmap
            dist-flat/*.sha256
            dist-flat/*.minisig
            dist-flat/*.intoto.jsonl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
