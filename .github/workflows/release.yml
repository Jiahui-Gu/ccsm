name: Release

# Triggered by version tag pushes (vX.Y.Z) or manual dispatch for dry-runs.
# Artifacts are published to a draft GitHub Release on real tag pushes only;
# workflow_dispatch runs stop after the artifact upload so dry-runs don't
# pollute the Releases tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.0-dryrun)'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: npm ci --legacy-peer-deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - name: Rebuild native modules for current Node ABI
        run: npm rebuild better-sqlite3
      - name: Verify native ABI
        run: npm run check:native
      - run: npm run lint:app
      - run: npm run typecheck
      - run: npm run build:app
      - run: npm run test:app

  build:
    name: build (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Guard against a mismatch between the git tag and package.json version —
      # e.g. someone tags v0.2.0 but forgot to bump version. Skipped on
      # workflow_dispatch so dry-runs (v0.0.0-dryrun tag input) don't fail.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG mismatches package.json version $PKG"
            exit 1
          fi
          echo "tag v$TAG matches package.json $PKG"

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        run: npm ci --legacy-peer-deps

      # Warn (don't fail) if signing secrets aren't configured. The build
      # still produces artifacts — just unsigned. Tracked per non-negotiable:
      # "builds MUST continue unsigned if absent".
      - name: Detect signing secrets
        id: secrets
        shell: bash
        run: |
          missing=()
          if [ "${{ matrix.platform }}" = "win" ] || [ "${{ matrix.platform }}" = "mac" ]; then
            if [ -z "${{ secrets.CSC_LINK }}" ]; then missing+=(CSC_LINK); fi
            if [ -z "${{ secrets.CSC_KEY_PASSWORD }}" ]; then missing+=(CSC_KEY_PASSWORD); fi
          fi
          if [ "${{ matrix.platform }}" = "mac" ]; then
            if [ -z "${{ secrets.APPLE_ID }}" ]; then missing+=(APPLE_ID); fi
            if [ -z "${{ secrets.APPLE_ID_PASSWORD }}" ]; then missing+=(APPLE_ID_PASSWORD); fi
            if [ -z "${{ secrets.APPLE_TEAM_ID }}" ]; then missing+=(APPLE_TEAM_ID); fi
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning title=Unsigned build::Missing signing secrets: ${missing[*]}. Build will continue unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          else
            echo "signed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web + electron
        run: npm run build:app

      # electron-builder invocation per OS. `--publish never` because we
      # upload via softprops/action-gh-release below — that gives us a
      # single source of release metadata and keeps `publish: github` in
      # package.json reserved for the update feed only.
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Skip notarization if Apple creds missing — electron-builder
          # reads these env vars and falls back to unsigned when empty.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.secrets.outputs.signed == 'true' && 'true' || 'false' }}

      - name: Warn on unsigned Windows build
        if: matrix.platform == 'win' && steps.secrets.outputs.signed != 'true'
        shell: bash
        run: |
          echo "::warning title=Unsigned Windows build::CSC_LINK / CSC_KEY_PASSWORD not set. The produced installer is unsigned — users will see a SmartScreen warning on first launch."

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # Install minisign so we can produce .minisig sidecars for each
      # release artifact. Placeholder-safe: if MINISIGN_PRIVATE_KEY isn't
      # configured we skip signing entirely (WARN, no fail) per v0.3 ship
      # non-negotiable "builds MUST continue unsigned if absent".
      - name: Install minisign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            linux)
              sudo apt-get update -y
              sudo apt-get install -y minisign
              ;;
            mac)
              brew install minisign
              ;;
            win)
              # Pre-built Windows binary from upstream (jedisct1/minisign).
              curl -fsSL -o minisign.zip https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-win64.zip
              unzip -o minisign.zip -d "$RUNNER_TEMP/minisign"
              echo "$RUNNER_TEMP/minisign/minisign-win64" >> "$GITHUB_PATH"
              ;;
          esac
          minisign -v || "$RUNNER_TEMP/minisign/minisign-win64/minisign.exe" -v || true

      # Sign each release artifact with minisign. Produces a .minisig sidecar
      # next to each binary in release/. continue-on-error keeps the workflow
      # green even if signing fails — sidecars are nice-to-have for v0.3, the
      # hard ship gate is the artifact itself.
      - name: Sign artifacts with minisign
        id: minisign
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -uo pipefail
          if [ -z "${MINISIGN_PRIVATE_KEY:-}" ] || [ -z "${MINISIGN_PASSWORD:-}" ]; then
            echo "::warning title=minisign skipped::MINISIGN_PRIVATE_KEY / MINISIGN_PASSWORD not configured. No .minisig sidecars will be produced."
            exit 0
          fi
          # Materialize the secret key to a temp file (minisign needs a file path).
          KEY_FILE="$RUNNER_TEMP/minisign.key"
          printf '%s' "$MINISIGN_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          shopt -s nullglob
          signed=0
          # Sign every shippable artifact; skip metadata yml / blockmap.
          for f in release/*.exe release/*.dmg release/*.zip release/*.AppImage release/*.deb release/*.rpm; do
            [ -f "$f" ] || continue
            echo "Signing $f"
            echo "$MINISIGN_PASSWORD" | minisign -S -s "$KEY_FILE" -m "$f" -t "ccsm release artifact $(basename "$f")"
            signed=$((signed + 1))
          done
          rm -f "$KEY_FILE"
          echo "Signed $signed artifact(s)."
          if [ "$signed" -eq 0 ]; then
            echo "::warning title=minisign no-op::No matching artifacts found in release/ to sign."
          fi

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ccsm-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            release/*.blockmap
            release/*.minisig
          if-no-files-found: error
          retention-days: 14

      # Only create/update the GitHub Release when this was a real tag push —
      # `workflow_dispatch` dry-runs stop at the artifact upload above so we
      # don't pollute the Releases tab with `v0.0.0-dryrun` entries.
      - name: Upload to GitHub Release (draft)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest*.yml
            release/*.blockmap
            release/*.minisig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
