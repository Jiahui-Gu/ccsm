name: e2e

on:
  pull_request:
    branches: [main, working]
    paths:
      - 'electron/**'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Task #322 — windows-only matrix. Round 1-7 of the v0.3 ship-gate
        # PRs ran ubuntu+macos+windows e2e but none were `required` in
        # branch protection, so devs alibied as "Linux only / mac only /
        # can't repro locally" through 6 rounds of speculative fixes.
        # All current devs are on Windows hosts; demoting e2e to
        # windows-only means local `npm run probe:e2e` green == CI green
        # with no platform escape hatch.
        os: [windows-latest]
    # Task #501 — historical P50=307s, P95=348s (5.8min) over 20 success
    # runs. 10min cap is ~1.7× P95, generous enough for cold-cache
    # `npm ci` + electron-rebuild + electron binary install while still
    # killing PR-#1066-style vitest hangs in 10min instead of the
    # GH-Actions 360min default. Not widened to 15min because P95 sits
    # comfortably under 6min; revisit only if e2e adds suites pushing
    # P95 past ~7min.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          # Task #364 — removed `cache: 'npm'`. The `actions/cache` step
          # below caches node_modules verbatim (with electron binary +
          # electron-ABI native bindings), making the setup-node ~/.npm
          # cache redundant and adding setup overhead with no install-time
          # benefit.
      # Cache node_modules directly — same rationale as ci.yml: `npm ci`
      # is the dominant Windows CI cost. Cache hit skips install entirely
      # and inherits the postinstall-rebuilt native bindings (better-sqlite3,
      # node-pty) from the cached tree, which is what the Electron e2e
      # actually loads.
      #
      # Task #512 (FOLLOWUP-D, v0.3 ship CI-speed) — UNIFIED cache key
      # with ci.yml (`nm-` prefix). Historical context: this used to be
      # `nm-e2e-` to isolate from ci.yml because ci.yml writes a tree
      # without the Electron binary AND with native modules compiled
      # against Node 20's ABI (NMV 115), while e2e needs the Electron
      # binary AND modules built against Electron's ABI (NMV 145). The
      # cache poisoning was real (Task #913 / #919). The healing steps
      # below — `Ensure Electron binary` (always re-runs `electron/install.js`,
      # idempotent) and `Ensure native modules built for Electron ABI`
      # (always re-runs `electron-rebuild`, no-op when ABI already matches)
      # — already self-heal a poisoned ci.yml-written cache. With healing
      # in place, isolating the cache key only forfeits cross-workflow
      # cache hits on the dominant install cost (~70s/cache-miss PR).
      # Adding ci.yml's `nm-` to restore-keys lets e2e benefit from any
      # warm ci.yml cache; the explicit healing steps below bring the
      # restored tree into Electron-ABI shape.
      - name: Cache node_modules
        id: nm_cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ runner.arch }}-node22-${{ hashFiles('package-lock.json') }}
          # Task #364 — fallback to any prior node22 cache when lockfile
          # hash changes. Cache hit rate was low because every dep bump
          # invalidates the primary key. With restore-keys, a stale cache
          # is restored and `npm ci` reconciles only the diff. Native
          # bindings carry old ABI from the stale cache; the
          # `npx electron-rebuild` step below always runs to realign with
          # Electron's NMV. Task #512 unified the prefix with ci.yml so
          # e2e can fall back to either workflow's most-recent cache.
          restore-keys: |
            nm-${{ runner.os }}-${{ runner.arch }}-node22-
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install deps
        if: steps.nm_cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps
      # Task #512 (FOLLOWUP-D) — healing fallback for cross-workflow cache
      # restore. With the unified `nm-` cache key (shared with ci.yml), a
      # cache hit may restore a tree that was written by ci.yml against a
      # slightly different package-lock.json (e.g. ci.yml ran on the merge
      # base, e2e.yml runs on a PR commit that bumps a dep). `npm ls
      # --depth=0` exits non-zero when the restored node_modules disagrees
      # with the on-disk package-lock.json (missing/extra top-level deps);
      # in that case we run a full `npm ci` to reconcile. On a healthy
      # exact-key cache hit the `npm ls` call is ~1s and the install is
      # skipped entirely. Stays inside the cache-hit branch so cache-miss
      # PRs are handled by the install step above.
      - name: Heal node_modules drift (cache-hit reconcile)
        if: steps.nm_cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          if ! npm ls --omit=optional --depth=0 >/dev/null 2>&1; then
            echo "node_modules drifted from package-lock.json — running npm ci to reconcile"
            npm ci --legacy-peer-deps
          else
            echo "node_modules matches package-lock.json — no reconcile needed"
          fi
      # Ensure the Electron binary (`node_modules/electron/dist/`) is present.
      # The node_modules cache is shared with ci.yml, which runs `npm ci` with
      # ELECTRON_SKIP_BINARY_DOWNLOAD=1 — when ci.yml wins the race to write
      # the cache, the restored node_modules has the electron JS shim but no
      # `dist/electron(.exe)` and no `path.txt`/`dist/version`, causing
      # `electron.launch` to error with "Electron failed to install correctly".
      # `electron/install.js` short-circuits via `isInstalled()` when the
      # binary is already present, so this is a fast no-op on healthy caches
      # and self-heals poisoned caches. Must NOT inherit the env var above.
      # (Task #913)
      - name: Ensure Electron binary
        run: node node_modules/electron/install.js
      # Rebuild native modules against Electron's ABI on every run. The
      # node_modules cache is shared with ci.yml, which compiles
      # better-sqlite3 / node-pty against Node 20's ABI (NODE_MODULE_VERSION
      # 115). When the e2e job restores that cache and launches Electron
      # (NODE_MODULE_VERSION 145), the main process throws
      # "The module ... was compiled against a different Node.js version"
      # during `initDb()` — the BrowserWindow is never created and the
      # harness times out with the bare "no renderer window appeared in
      # time" error. Running `@electron/rebuild` is a fast no-op when the
      # `.node` files already match Electron's ABI and self-heals when
      # ci.yml won the cache race. Diagnosed via Task #919.
      - name: Ensure native modules built for Electron ABI
        run: npx electron-rebuild
      - name: Build
        run: npm run build:app
      - name: Run e2e
        # Task #343 (Wave M3.5-CHECK no-skipif-cheat) — removed
        # `E2E_SKIP=harness-real-cli`. The blanket skip env was a
        # vacuously-green gate (the harness ran zero cases on every CI
        # run). The harness now sentinel-skips itself in-process when
        # `claude` is missing from PATH and `CCSM_CLAUDE_BIN` is unset
        # (see `scripts/harness-real-cli.mjs:detectClaudeBin`), printing
        # a `[SENTINEL-SKIP] harness-real-cli` line in the summary so the
        # gating reason is visible in CI logs. Public CI runners still
        # have neither the binary nor Anthropic auth, so the net effect
        # on green-CI matches the prior env (whole harness skipped) but
        # the skip is now an explicit, auditable sentinel rather than a
        # silent E2E_SKIP entry. Locally `pnpm run probe:e2e` keeps the
        # full harness (the dev's PATH normally has `claude`).
        # Per-case skips inside the harness (currently:
        # session-state-becomes-idle pending PR-A renderer cutover, see
        # #265 followup) are surfaced as `[SENTINEL-SKIP]` rows in the
        # final HARNESS SUMMARY table.
        run: npm run probe:e2e
      - name: Upload e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.os }}
          path: |
            dogfood-logs/
            docs/screenshots/
          retention-days: 7
