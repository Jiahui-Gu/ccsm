name: e2e

on:
  pull_request:
    branches: [main, working]
    paths:
      - 'electron/**'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Run e2e (Linux with xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run probe:e2e
      - name: Run e2e (mac/win)
        if: runner.os != 'Linux'
        run: npm run probe:e2e
      - name: Upload e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.os }}
          path: |
            dogfood-logs/
            docs/screenshots/
          retention-days: 7
