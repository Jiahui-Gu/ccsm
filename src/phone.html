<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>CCSM Remote</title>
    <style>
      html, body { margin: 0; height: 100%; background: #111; color: #ddd; font-family: system-ui, sans-serif; }
      #status { padding: 4px 8px; font-size: 12px; opacity: 0.8; }
      #sessions { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 8px; }
      .chip { background: #222; color: #ddd; border: 1px solid #444; border-radius: 12px; padding: 4px 10px; font-size: 12px; }
      .chip-active { background: #2d6; color: #111; }
      #terminal { position: absolute; inset: 56px 0 0 0; }
    </style>
  </head>
  <body>
    <div id="status">connecting…</div>
    <div id="sessions"></div>
    <div id="terminal"></div>
  </body>
</html>
