<!DOCTYPE html>
<!--
  task #336 — visual mock of the Bash command typing-preview in ToolBlock.
  Renders BEFORE (no preview — the user only sees a generic "Bash …" while
  the model types) and AFTER (live partial command + blinking caret) side
  by side. capture.mjs grabs each variant via ?variant=before|after.

  Colors / spacing pulled from the live ToolBlock render path in
  src/components/chat/blocks/ToolBlock.tsx so the screenshot reads as the
  real chrome. This is a static mock — no agent process — so we can show
  the typing state deterministically without waiting on a CLI session.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>task #336 mock</title>
<style>
  :root {
    --bg-panel: #0f1115;
    --fg-secondary: #c8ccd4;
    --fg-tertiary: #7a8290;
    --border-subtle: #232830;
  }
  html, body { background: var(--bg-panel); color: var(--fg-secondary); margin: 0; padding: 24px; font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  .label { font-size: 11px; color: var(--fg-tertiary); text-transform: lowercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .row { display: flex; align-items: baseline; gap: 12px; padding: 6px 0; border-top: 1px solid var(--border-subtle); }
  .row:first-of-type { border-top: 0; }
  .chev { width: 12px; color: var(--fg-tertiary); }
  .name { color: var(--fg-secondary); font-weight: 600; }
  .brief { color: var(--fg-tertiary); font-size: 11px; }
  .ellipsis { color: var(--fg-tertiary); font-size: 11px; margin-left: 8px; }
  /* Mirrors src/styles/global.css .bash-typing-caret. */
  @keyframes bashTypingCaret {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .caret {
    display: inline-block;
    margin-left: 1px;
    color: inherit;
    animation: bashTypingCaret 0.6s steps(1, end) infinite;
    /* For the static screenshot, the keyframe lands at opacity:1 by default
       — we intentionally don't pause it, so capture.mjs sees the visible
       half of the cycle. */
  }
  h1 { font-size: 13px; color: var(--fg-secondary); margin: 0 0 16px; font-weight: 500; }
</style>
</head>
<body>
<h1 id="title"></h1>
<div id="root"></div>
<script>
  const params = new URLSearchParams(location.search);
  const variant = params.get('variant') || 'after';
  document.getElementById('title').textContent =
    variant === 'before'
      ? 'BEFORE — no command preview while the model is typing tool input'
      : 'AFTER (#336) — live Bash command preview with typing caret';
  const root = document.getElementById('root');
  const beforeRow = `
    <div class="label">model is mid-stream typing the Bash tool_use input</div>
    <div class="row">
      <span class="chev">›</span>
      <span class="name">Bash</span>
      <span class="brief">()</span>
      <span class="ellipsis">…</span>
    </div>`;
  const afterRow = `
    <div class="label">model is mid-stream typing the Bash tool_use input</div>
    <div class="row">
      <span class="chev">›</span>
      <span class="name">Bash</span>
      <span class="brief">(npm run buil<span class="caret">▋</span>)</span>
      <span class="ellipsis">…</span>
    </div>
    <div class="label" style="margin-top:18px">moments later — fully streamed, caret cleared</div>
    <div class="row">
      <span class="chev">›</span>
      <span class="name">Bash</span>
      <span class="brief">(npm run build)</span>
      <span class="ellipsis">…</span>
    </div>`;
  root.innerHTML = variant === 'before' ? beforeRow : afterRow;
</script>
</body>
</html>
