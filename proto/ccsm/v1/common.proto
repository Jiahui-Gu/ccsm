syntax = "proto3";

package ccsm.v1;

// common.proto ŌĆö shared value types referenced by multiple domains.
//
// Spec sources:
//   - frag-6-7 ┬¦6.5  : `bootNonce` is a ULID (NOT `Date.now()`); two crashes
//                      within 1 ms still produce distinct ids (r2-obs OPEN-4).
//   - frag-3.4.1 ┬¦3.4.1.b + frag-3.5.1 ┬¦3.5.1.4 : `bootNonce` carriage on
//                      stream subscribe RPCs (camelCase JSON; proto field
//                      `boot_nonce` serializes to `bootNonce` by default).
//   - 2026-05-02-final-architecture.md ┬¦1 + 2026-05-02-v0.3-reconciliation.md
//                      ┬¦2 (single dataRoot per machine).
//   - src/shared/sessionState.ts : canonical IPC SessionState vocabulary
//                      (`idle | running | requires_action`, mirroring the
//                      SDK's `SDKSessionStateChangedMessage.state` enum).
//                      Plus `exited` for the lifecycle-terminal state that
//                      `GetSessionState` must be able to render without
//                      replaying a separate delta.
//
// Fields use snake_case in proto (per buf STANDARD lint); the wire / JSON
// form is camelCase (`bootNonce`, `dataRoot`) which matches the canonical
// camelCase lock from r3-fwdcompat CF-2.
//
// `boot_nonce` is carried as a raw `string` everywhere (not wrapped in a
// dedicated message). The wrapper bought no concrete typing or validation
// in v0.3 and added a layer of indirection on every usage site; per the
// v0.3 zero-rework rule, simpler wins.

// DataRoot ŌĆö single per-machine on-disk root (e.g. `~/.ccsm`).
// Pinned by the v0.3 reconciliation ┬¦2 single-source-of-truth rule.
message DataRoot {
  // Absolute path. Daemon owns lifetime; clients are read-only consumers
  // and use this for diagnostics / "open log dir" affordances.
  string path = 1;
}

// SessionState ŌĆö canonical lifecycle / turn-state vocabulary for the
// backend-authoritative session model (final-arch ┬¦2.7).
//
// Mirrors `src/shared/sessionState.ts` (`idle | running | requires_action`
// ŌĆö itself a mirror of the SDK's `SDKSessionStateChangedMessage.state`)
// plus `EXITED` for the lifecycle-terminal state. `EXITED` is required as
// an enum value (in addition to the `SessionExited` delta variant) so a
// `GetSessionState` snapshot of an already-exited session can render
// correctly without forcing the client to also fold a delta.
//
// IMPORTANT: this is the IPC / data-plane vocabulary, NOT the renderer's
// 2-state UI model (`'idle' | 'waiting'` in `src/types.ts`). The mapping
// IPC ŌåÆ UI lives in `src/agent/lifecycle.ts:mapState`.
enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_IDLE = 1;
  SESSION_STATE_RUNNING = 2;
  SESSION_STATE_REQUIRES_ACTION = 3;
  SESSION_STATE_EXITED = 4;
}
