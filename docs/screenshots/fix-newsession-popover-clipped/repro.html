<!doctype html>
<html><head><meta charset="utf-8"><title>repro</title>
<style>
  body { margin:0; font-family: system-ui; background:#1a1a1a; color:#ddd; height:100vh; display:flex; }
  .sidebar {
    width: 260px;
    height: 100vh;
    background: rgba(30,30,40,0.8);
    backdrop-filter: blur(20px); /* the culprit */
    overflow: hidden;
    border-right: 1px solid #333;
    padding: 12px;
    box-sizing: border-box;
    position: relative;
  }
  .main { flex:1; padding: 20px; }
  .row { display:flex; gap:8px; align-items:center; }
  .new-btn { flex:1; height:32px; background:#2a2a2a; border:1px solid #444; border-radius:4px 0 0 4px; padding:0 8px; }
  .chev { width:28px; height:32px; background:#2a2a2a; border:1px solid #444; border-left:0; border-radius:0 4px 4px 0; }
  .popover {
    position: fixed;
    min-width: 320px;
    background: #2a2a3a;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 12px;
    z-index: 9999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
</style></head>
<body>
  <div class="sidebar">
    <div class="row">
      <button class="new-btn">+ New session</button>
      <button class="chev" id="chev">v</button>
    </div>
    <!-- popover INSIDE sidebar (current code) -->
    <div class="popover" id="pop1" style="top:60px; left:20px;">Popover INSIDE backdrop-filtered sidebar — should be CLIPPED on the right by overflow:hidden</div>
  </div>
  <div class="main">
    Main content. Open devtools to inspect. Notice popover #1 is clipped because backdrop-filter on .sidebar creates a containing block for fixed children.
  </div>
  <script>
    // Add an outside-portal popover for comparison
    const p = document.createElement('div');
    p.className = 'popover';
    const r = document.getElementById('chev').getBoundingClientRect();
    p.style.top = (r.bottom + 4) + 'px';
    p.style.left = r.left + 'px';
    p.textContent = 'Popover via PORTAL to body — escapes backdrop-filter, fully visible';
    document.body.appendChild(p);
  </script>
</body></html>
